apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vikunja-base
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: hiroba
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: vikunja
  source:
    repoURL: https://github.com/7K-Hiroba/vikunja.git
    targetRevision: HEAD
    path: helm/base
    helm:
      valuesObject:
        replicaCount: 1
        image:
          repository: vikunja/vikunja
          pullPolicy: IfNotPresent
        gateway:
          enabled: true
          parentRefs:
            - name: default-gateway
          hostnames:
            - vikunja.example.com
        s3:
          enabled: true
          endpoint: "http://garage.garage.svc.cluster.local:3900"
          bucket: vikunja-files
          usePathStyle: true
          existingSecret:
           name: vikunja-s3-key
           accessKeyKey: AWS_ACCESS_KEY_ID
           secretKeyKey: AWS_SECRET_ACCESS_KEY
        env:
          - name: VIKUNJA_SERVICE_PUBLICURL
            value: "https://vikunja.example.com"
          - name: VIKUNJA_SERVICE_ENABLEMETRICS
            value: "true"
          - name: VIKUNJA_SERVICE_ENABLEREGISTRATION
            value: "false"
          - name: VIKUNJA_DATABASE_TYPE
            value: postgres
          - name: VIKUNJA_DATABASE_HOST
            value: vikunja-pg-rw
          - name: VIKUNJA_DATABASE_USER
            value: vikunja
          - name: VIKUNJA_DATABASE_DATABASE
            value: vikunja
          - name: VIKUNJA_DATABASE_SSLMODE
            value: require
          # -- OpenID Connect. Uncomment and fill in to enable SSO.
          # The client secret is pulled from the platform ExternalSecret.
          # - name: VIKUNJA_AUTH_LOCAL_ENABLED
          #   value: "false"
          # - name: VIKUNJA_AUTH_OPENID_ENABLED
          #   value: "true"
          # - name: VIKUNJA_AUTH_OPENID_REDIRECTURL
          #   value: "https://vikunja.example.com/auth/openid/"
          # - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_NAME
          #   value: Keycloak
          # - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_AUTHURL
          #   value: https://keycloak.example.com/realms/myrealm
          # - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTID
          #   value: vikunja
          # - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_SCOPE
          #   value: "openid profile email"
        envFrom:
          - secretRef:
              name: vikunja
  destination:
    server: https://kubernetes.default.svc
    namespace: vikunja
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
