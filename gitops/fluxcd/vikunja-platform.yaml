apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vikunja-platform
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: hiroba
spec:
  interval: 30m
  suspend: true # set false only when actively managing infrastructure
  chart:
    spec:
      chart: ./helm/platform
      sourceRef:
        kind: GitRepository
        name: vikunja
        namespace: flux-system
  targetNamespace: vikunja
  install:
    createNamespace: true
  values:
    global:
      appName: vikunja
    postgres:
      enabled: true
      provider: cnpg
      instances: 1
      storage:
        size: 10Gi
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 256Mi
      imageName: ghcr.io/cloudnative-pg/postgresql:18.3
      database: vikunja
      owner: vikunja
      backup:
        enabled: true
        schedule: "0 2 * * *"
        retentionPolicy: "7d"
        garage:
          clusterRef: garage
          endpoint: "http://garage.garage.svc.cluster.local:3900"
    s3:
      enabled: true
      provider: garage
      bucketName: files
      garage:
        clusterRef: garage
    externalSecrets:
      enabled: true
      refreshInterval: 1h
      storeRef:
        name: cluster-secret-store
        kind: ClusterSecretStore
      data:
        - secretKey: VIKUNJA_DATABASE_PASSWORD
          remoteKey: vikunja/postgres
          property: password
        - secretKey: VIKUNJA_SERVICE_JWTSECRET
          remoteKey: vikunja/service
          property: jwtSecret
        # -- OIDC client secret. Uncomment and adjust the provider ID
        # to match the base chart env vars.
        # - secretKey: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTSECRET
        #   remoteKey: vikunja/oidc
        #   property: clientSecret
