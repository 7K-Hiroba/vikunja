apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vikunja-base
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: hiroba
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/base
      sourceRef:
        kind: GitRepository
        name: vikunja
        namespace: flux-system
  targetNamespace: vikunja
  install:
    createNamespace: true
  values:
    replicaCount: 1
    image:
      repository: vikunja/vikunja
      pullPolicy: IfNotPresent
    gateway:
      enabled: true
      parentRefs:
        - name: default-gateway
      hostnames:
        - vikunja.example.com
    persistence:
      files:
        enabled: true
        size: 5Gi
        accessMode: ReadWriteOnce
    env:
      - name: VIKUNJA_SERVICE_PUBLICURL
        value: "https://vikunja.example.com"
      - name: VIKUNJA_SERVICE_ENABLEMETRICS
        value: "true"
      - name: VIKUNJA_DATABASE_TYPE
        value: postgres
      - name: VIKUNJA_DATABASE_HOST
        value: vikunja-pg-rw
      - name: VIKUNJA_DATABASE_USER
        value: vikunja
      - name: VIKUNJA_DATABASE_DATABASE
        value: vikunja
      - name: VIKUNJA_DATABASE_SSLMODE
        value: require
      - name: VIKUNJA_FILES_BASEPATH
        value: /app/vikunja/files
    envFrom:
      - secretRef:
          name: vikunja
