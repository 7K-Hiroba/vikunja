apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vikunja-platform
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: hiroba
spec:
  interval: 10m
  targetNamespace: vikunja
  sourceRef:
    kind: GitRepository
    name: vikunja
  path: ./helm/platform
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: vikunja
