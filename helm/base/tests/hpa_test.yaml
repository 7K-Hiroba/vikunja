suite: HorizontalPodAutoscaler
templates:
  - templates/hpa.yaml
tests:
  - it: is not created by default
    asserts:
      - hasDocuments:
          count: 0

  - it: is created when autoscaling is enabled
    set:
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 5
        targetCPUUtilizationPercentage: 75
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 5

  - it: targets the deployment
    set:
      autoscaling.enabled: true
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
