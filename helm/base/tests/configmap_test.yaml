suite: ConfigMap
templates:
  - templates/configmap.yaml
tests:
  - it: is not created when disabled
    set:
      configMap.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when enabled
    set:
      configMap:
        enabled: true
        data:
          config.yml: |
            auth:
              openid:
                enabled: true
                providers:
                  keycloak:
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-vikunja-config
      - isNotNull:
          path: data["config.yml"]

  - it: includes OIDC provider declaration
    set:
      configMap:
        enabled: true
        data:
          config.yml: |
            auth:
              openid:
                enabled: true
                providers:
                  keycloak:
    asserts:
      - matchRegex:
          path: data["config.yml"]
          pattern: "keycloak:"
