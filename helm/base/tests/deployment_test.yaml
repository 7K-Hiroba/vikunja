suite: Deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1

  - it: uses the correct image
    set:
      image.repository: ghcr.io/example/vikunja
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/vikunja:1.2.3"

  - it: falls back to appVersion when tag is empty
    set:
      image.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":2\\.3\\.0$"

  - it: omits replicas when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: applies pod security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000

  - it: applies container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: sets resource limits and requests
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests

  - it: exposes Vikunja's container port (3456) by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3456
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http

  - it: sets container port from service.targetPort
    set:
      service.targetPort: 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: probes target Vikunja's API info endpoint
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/v1/info
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/v1/info

  - it: renders default Vikunja env vars
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_DATABASE_TYPE
            value: postgres
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_BASEPATH
            value: /app/vikunja/files
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_SERVICE_ENABLEREGISTRATION
            value: "false"

  - it: renders OIDC env vars when set
    set:
      env:
        - name: VIKUNJA_AUTH_LOCAL_ENABLED
          value: "false"
        - name: VIKUNJA_AUTH_OPENID_ENABLED
          value: "true"
        - name: VIKUNJA_AUTH_OPENID_REDIRECTURL
          value: "https://vikunja.example.com/auth/openid/"
        - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_NAME
          value: Keycloak
        - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_AUTHURL
          value: https://keycloak.example.com/realms/myrealm
        - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTID
          value: vikunja
        - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_SCOPE
          value: "openid profile email"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_AUTH_LOCAL_ENABLED
            value: "false"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_AUTH_OPENID_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_NAME
            value: Keycloak
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_AUTHURL
            value: https://keycloak.example.com/realms/myrealm
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTID
            value: vikunja

  - it: renders custom env vars when set
    set:
      env:
        - name: VIKUNJA_LOG_LEVEL
          value: DEBUG
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_LOG_LEVEL
            value: DEBUG

  - it: pulls envFrom Secret when configured
    set:
      envFrom:
        - secretRef:
            name: vikunja
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: vikunja

  - it: omits envFrom when none configured
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: mounts /tmp and /app/vikunja/files by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: files
            mountPath: /app/vikunja/files

  - it: uses emptyDir for files when persistence is disabled
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: files
            emptyDir: {}

  - it: uses managed PVC for files when persistence is enabled
    set:
      persistence.files.enabled: true
    release:
      name: prod
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: files
            persistentVolumeClaim:
              claimName: prod-vikunja-files

  - it: uses existingClaim when set
    set:
      persistence.files.enabled: true
      persistence.files.existingClaim: my-vikunja-pvc
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: files
            persistentVolumeClaim:
              claimName: my-vikunja-pvc

  - it: renders extra volumes and mounts alongside the defaults
    set:
      extraVolumes:
        - name: cache
          emptyDir: {}
      extraVolumeMounts:
        - name: cache
          mountPath: /cache
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: cache
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: cache
            mountPath: /cache

  - it: renders pod annotations
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: injects database password from CNPG secret by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: vikunja-pg-app
                key: password

  - it: omits database password when existingPasswordSecret.name is empty
    set:
      database.existingPasswordSecret.name: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_DATABASE_PASSWORD
          anyName: true

  - it: uses custom database password secret
    set:
      database:
        existingPasswordSecret:
          name: my-custom-secret
          key: db-password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-custom-secret
                key: db-password

  - it: injects S3 env vars when s3 is enabled
    set:
      s3:
        enabled: true
        endpoint: "http://garage.garage.svc.cluster.local:3900"
        bucket: vikunja-files
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_S3_ENDPOINT
            value: "http://garage.garage.svc.cluster.local:3900"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_S3_BUCKET
            value: vikunja-files

  - it: injects S3 region when set
    set:
      s3:
        enabled: true
        endpoint: "https://s3.amazonaws.com"
        bucket: my-bucket
        region: us-east-1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_S3_REGION
            value: us-east-1

  - it: omits S3 region when not set
    set:
      s3:
        enabled: true
        endpoint: "http://garage.garage.svc.cluster.local:3900"
        bucket: vikunja-files
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_S3_REGION
          anyName: true

  - it: injects S3 credentials from existingSecret
    set:
      s3:
        enabled: true
        endpoint: "http://garage.garage.svc.cluster.local:3900"
        bucket: vikunja-files
        existingSecret:
          name: vikunja-s3-key
          accessKeyKey: AWS_ACCESS_KEY_ID
          secretKeyKey: AWS_SECRET_ACCESS_KEY
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_S3_ACCESSKEY
            valueFrom:
              secretKeyRef:
                name: vikunja-s3-key
                key: AWS_ACCESS_KEY_ID
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_S3_SECRETKEY
            valueFrom:
              secretKeyRef:
                name: vikunja-s3-key
                key: AWS_SECRET_ACCESS_KEY

  - it: omits S3 credential env vars when existingSecret.name is empty
    set:
      s3:
        enabled: true
        endpoint: "http://garage.garage.svc.cluster.local:3900"
        bucket: vikunja-files
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_S3_ACCESSKEY
          anyName: true
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_S3_SECRETKEY
          anyName: true

  - it: uses emptyDir for files when s3 is enabled regardless of persistence
    set:
      s3:
        enabled: true
        endpoint: "http://garage.garage.svc.cluster.local:3900"
        bucket: vikunja-files
      persistence.files.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: files
            emptyDir: {}

  - it: does not inject S3 env vars when s3 is disabled
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_S3_ENDPOINT
          anyName: true
