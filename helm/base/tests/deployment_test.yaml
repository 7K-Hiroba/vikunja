suite: Deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1

  - it: uses the correct image
    set:
      image.repository: ghcr.io/example/vikunja
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/vikunja:1.2.3"

  - it: falls back to appVersion when tag is empty
    set:
      image.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":0\\.24\\.6$"

  - it: omits replicas when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: applies pod security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000

  - it: applies container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: sets resource limits and requests
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests

  - it: exposes Vikunja's container port (3456) by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3456
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http

  - it: sets container port from service.targetPort
    set:
      service.targetPort: 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: probes target Vikunja's API info endpoint
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/v1/info
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/v1/info

  - it: renders default Vikunja env vars
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_DATABASE_TYPE
            value: postgres
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_FILES_BASEPATH
            value: /app/vikunja/files

  - it: renders custom env vars when set
    set:
      env:
        - name: VIKUNJA_LOG_LEVEL
          value: DEBUG
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_LOG_LEVEL
            value: DEBUG

  - it: pulls envFrom Secret when configured
    set:
      envFrom:
        - secretRef:
            name: vikunja
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: vikunja

  - it: omits envFrom when none configured
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: mounts /tmp and /app/vikunja/files by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: files
            mountPath: /app/vikunja/files

  - it: uses emptyDir for files when persistence is disabled
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: files
            emptyDir: {}

  - it: uses managed PVC for files when persistence is enabled
    set:
      persistence.files.enabled: true
    release:
      name: prod
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: files
            persistentVolumeClaim:
              claimName: prod-vikunja-files

  - it: uses existingClaim when set
    set:
      persistence.files.enabled: true
      persistence.files.existingClaim: my-vikunja-pvc
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: files
            persistentVolumeClaim:
              claimName: my-vikunja-pvc

  - it: renders extra volumes and mounts alongside the defaults
    set:
      extraVolumes:
        - name: cache
          emptyDir: {}
      extraVolumeMounts:
        - name: cache
          mountPath: /cache
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: cache
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: cache
            mountPath: /cache

  - it: renders pod annotations
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
