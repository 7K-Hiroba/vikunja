suite: Deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1

  - it: uses the official Vikunja image
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^vikunja/vikunja:"

  - it: uses the correct image when overridden
    set:
      image.repository: ghcr.io/example/vikunja
      image.tag: "2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/vikunja:2.0.0"

  - it: falls back to appVersion when tag is empty
    set:
      image.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":2\\.3\\.0$"

  - it: omits replicas when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: applies pod security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000

  - it: applies container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: sets resource limits and requests
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi

  - it: sets container port to 3456 (Vikunja default)
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3456

  - it: uses /api/v1/info for liveness probe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/v1/info

  - it: uses /api/v1/info for readiness probe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/v1/info

  - it: renders env vars when set
    set:
      env:
        - name: VIKUNJA_LOG_LEVEL
          value: DEBUG
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_LOG_LEVEL
            value: DEBUG

  - it: renders env vars with valueFrom
    set:
      env:
        - name: VIKUNJA_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vikunja-pg-app
              key: password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VIKUNJA_DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: vikunja-pg-app
                key: password

  - it: mounts PVC via persistence.claims
    set:
      persistence.claims:
        - name: files
          enabled: true
          size: 5Gi
          accessMode: ReadWriteOnce
          mountPath: /app/vikunja/files
    release:
      name: test-vikunja
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: persistence-files
            persistentVolumeClaim:
              claimName: test-vikunja-files
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: persistence-files
            mountPath: /app/vikunja/files

  - it: renders envFrom when set
    set:
      envFrom:
        - secretRef:
            name: vikunja
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: vikunja

  - it: renders pod annotations
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: renders extra volumes and mounts
    set:
      extraVolumes:
        - name: cache
          emptyDir: {}
      extraVolumeMounts:
        - name: cache
          mountPath: /cache
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: cache
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: cache
            mountPath: /cache
