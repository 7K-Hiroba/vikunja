# Default values for Vikunja

replicaCount: 1

image:
  repository: ghcr.io/7k-hiroba/Vikunja
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

gateway:
  enabled: true
  annotations: {}
  # -- Parent Gateway references
  parentRefs:
    - name: default-gateway
      # namespace: gateway-system
      # sectionName: https
  # -- Hostnames to match
  hostnames:
    - myapp.example.com
  # -- Routing rules (omit for a simple catch-all route to the service)
  rules: []
  #  - matches:
  #      - path:
  #          type: PathPrefix
  #          value: /api
  #    filters:
  #      - type: RequestHeaderModifier
  #        requestHeaderModifier:
  #          add:
  #            - name: X-Forwarded-Prefix
  #              value: /api

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# -- Pod Disruption Budget. Only meaningful when running more than one replica
# (replicaCount > 1 or autoscaling.enabled).
podDisruptionBudget:
  enabled: false
  # -- Exactly one of minAvailable or maxUnavailable should be set
  minAvailable: 1
  # maxUnavailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
env: []
extraVolumes: []
extraVolumeMounts: []
