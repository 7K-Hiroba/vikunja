# Default values for vikunja
# Vikunja: open-source, self-hostable to-do app — https://vikunja.io

# Single replica is the safe default when using PVC (ReadWriteOnce) for file
# storage. When S3 is enabled instead (see s3 below), Vikunja stores files in
# an object store and multiple replicas can serve traffic simultaneously —
# enabling autoscaling and PodDisruptionBudget.
replicaCount: 1

image:
  repository: vikunja/vikunja
  pullPolicy: IfNotPresent
  # Overrides Chart.appVersion. Pin this in production.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# Vikunja's container runs as UID 1000 and writes only to mounted volumes,
# so readOnlyRootFilesystem is honoured.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  # Vikunja serves the API and frontend on port 3456 inside the container.
  targetPort: 3456

gateway:
  enabled: true
  annotations: {}
  parentRefs:
    - name: default-gateway
      # namespace: gateway-system
      # sectionName: https
  hostnames:
    - vikunja.example.com
  # Empty rules → render a default catch-all PathPrefix `/` route.
  rules: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /api/v1/info
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/info
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3

# Autoscaling is OFF by default. When using PVC storage, only a single
# replica can mount a ReadWriteOnce volume, so scaling is unsafe.
# When S3 is enabled instead, file storage is shared and autoscaling works.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Persistent storage for Vikunja's uploaded files. When disabled the chart
# falls back to an emptyDir and uploads are lost on pod restart.
# Ignored when s3.enabled is true — S3 takes over file storage and this PVC
# is never created.
persistence:
  files:
    enabled: false
    size: 5Gi
    accessMode: ReadWriteOnce
    storageClass: ""
    # Reuse an existing PVC instead of letting the chart create one.
    existingClaim: ""

# S3-compatible object storage for Vikunja's uploaded files. When enabled,
# Vikunja reads and writes files from S3 instead of the local filesystem,
# the PVC above is skipped, and scaling beyond one replica becomes safe.
s3:
  enabled: false
  # S3 endpoint URL. Required. For Garage: http://garage.garage.svc.cluster.local:3900
  endpoint: ""
  # S3 bucket name. Required.
  bucket: ""
  # S3 region. Required — the AWS SDK needs a region even for non-AWS
  # endpoints like Garage. Use "garage" for self-hosted Garage clusters.
  region: ""
  # Use path-style addressing (https://endpoint/bucket/key instead of
  # https://bucket.endpoint/key). Required for Garage, MinIO, and most
  # self-hosted S3 services. AWS S3 uses virtual-hosted-style by default.
  usePathStyle: true
  # Reference a Kubernetes Secret that holds the S3 access key and secret key.
  # The platform chart's Garage integration creates a Secret named
  # <app>-s3-key with keys AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY.
  existingSecret:
    name: ""
    accessKeyKey: AWS_ACCESS_KEY_ID
    secretKeyKey: AWS_SECRET_ACCESS_KEY

# Vikunja config is supplied as environment variables — see
# https://vikunja.io/docs/config-options/ for the full reference. The
# defaults below assume the companion platform chart has provisioned the
# CNPG cluster (service `vikunja-pg-rw`) and an ExternalSecret named
# `vikunja` carrying VIKUNJA_DATABASE_PASSWORD and VIKUNJA_SERVICE_JWTSECRET.
env:
  - name: VIKUNJA_SERVICE_PUBLICURL
    value: "https://vikunja.example.com"
  - name: VIKUNJA_SERVICE_ENABLEMETRICS
    value: "true"
  - name: VIKUNJA_SERVICE_ENABLEREGISTRATION
    value: "false"
  - name: VIKUNJA_DATABASE_TYPE
    value: postgres
  - name: VIKUNJA_DATABASE_HOST
    value: vikunja-pg-rw
  - name: VIKUNJA_DATABASE_USER
    value: vikunja
  - name: VIKUNJA_DATABASE_DATABASE
    value: vikunja
  - name: VIKUNJA_DATABASE_SSLMODE
    value: disable
  - name: VIKUNJA_FILES_BASEPATH
    value: /app/vikunja/files
  # -- OpenID Connect authentication. Uncomment and fill in to enable SSO.
  # The client secret is pulled from the platform ExternalSecret via envFrom.
  # - name: VIKUNJA_AUTH_LOCAL_ENABLED
  #   value: "false"
  # - name: VIKUNJA_AUTH_OPENID_ENABLED
  #   value: "true"
  # - name: VIKUNJA_AUTH_OPENID_REDIRECTURL
  #   value: "https://vikunja.example.com/auth/openid/"
  # - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_NAME
  #   value: Keycloak
  # - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_AUTHURL
  #   value: https://keycloak.example.com/realms/myrealm
  # - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTID
  #   value: vikunja
  # - name: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_SCOPE
  #   value: "openid profile email"

# Reference the CNPG-managed Secret that holds the auto-generated app-user
# password. CNPG creates <cluster>-app (e.g. vikunja-pg-app) with key
# "password" during bootstrap. Leave name empty to skip injecting the env var.
database:
  existingPasswordSecret:
    name: vikunja-pg-app
    key: password

# Pull non-public values (JWT secret, mailer password) from Secrets.
envFrom: []
#  - secretRef:
#      name: vikunja

nodeSelector: {}
tolerations: []
affinity: {}
extraVolumes: []
extraVolumeMounts: []
