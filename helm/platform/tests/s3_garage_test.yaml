suite: S3 Garage
templates:
  - templates/storage/s3-garage.yaml
capabilities:
  apiVersions:
    - garage.rajsingh.info/v1beta1
tests:
  - it: is not created when s3 is disabled
    set:
      s3.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: is not created when provider is crossplane
    set:
      s3.enabled: true
      s3.provider: crossplane
    asserts:
      - hasDocuments:
          count: 0

  - it: renders GarageBucket and GarageKey for each bucket
    set:
      s3:
        enabled: true
        provider: garage
        buckets:
          - name: files
            acl: private
        garage:
          clusterRef: garage
    asserts:
      - hasDocuments:
          count: 2

  - it: renders GarageBucket with correct name and clusterRef
    set:
      s3:
        enabled: true
        provider: garage
        buckets:
          - name: files
            acl: private
        garage:
          clusterRef: my-garage
    asserts:
      - isKind:
          of: GarageBucket
        documentIndex: 0
      - equal:
          path: apiVersion
          value: garage.rajsingh.info/v1beta1
        documentIndex: 0
      - equal:
          path: metadata.name
          value: vikunja-files
        documentIndex: 0
      - equal:
          path: spec.clusterRef.name
          value: my-garage
        documentIndex: 0

  - it: renders GarageKey with secret template and bucket permissions
    set:
      s3:
        enabled: true
        provider: garage
        buckets:
          - name: files
            acl: private
        garage:
          clusterRef: garage
    asserts:
      - isKind:
          of: GarageKey
        documentIndex: 1
      - equal:
          path: apiVersion
          value: garage.rajsingh.info/v1beta1
        documentIndex: 1
      - equal:
          path: metadata.name
          value: vikunja-files-s3-key
        documentIndex: 1
      - equal:
          path: spec.clusterRef.name
          value: garage
        documentIndex: 1
      - equal:
          path: spec.secretTemplate.name
          value: vikunja-files-s3-key
        documentIndex: 1
      - equal:
          path: spec.secretTemplate.additionalData.S3_BUCKET
          value: "vikunja-files"
        documentIndex: 1
      - equal:
          path: spec.bucketPermissions[0].bucketRef.name
          value: vikunja-files
        documentIndex: 1
      - equal:
          path: spec.bucketPermissions[0].read
          value: true
        documentIndex: 1
      - equal:
          path: spec.bucketPermissions[0].write
          value: true
        documentIndex: 1

  - it: omits clusterRefNamespace when not set
    set:
      s3:
        enabled: true
        provider: garage
        buckets:
          - name: files
            acl: private
        garage:
          clusterRef: garage
    asserts:
      - isNull:
          path: spec.clusterRef.namespace
        documentIndex: 0
      - isNull:
          path: spec.clusterRef.namespace
        documentIndex: 1

  - it: sets clusterRefNamespace on bucket and key
    set:
      s3:
        enabled: true
        provider: garage
        buckets:
          - name: files
            acl: private
        garage:
          clusterRef: garage
          clusterRefNamespace: garage-system
    asserts:
      - equal:
          path: spec.clusterRef.namespace
          value: garage-system
        documentIndex: 0
      - equal:
          path: spec.clusterRef.namespace
          value: garage-system
        documentIndex: 1
