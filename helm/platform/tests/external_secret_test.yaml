suite: ExternalSecret
templates:
  - templates/secrets/external-secret.yaml
capabilities:
  apiVersions:
    - external-secrets.io/v1
tests:
  - it: is not created when disabled
    set:
      externalSecrets.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when enabled
    set:
      externalSecrets.enabled: true
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1

  - it: uses configured store reference
    set:
      externalSecrets:
        enabled: true
        storeRef:
          name: my-store
          kind: SecretStore
    asserts:
      - equal:
          path: spec.secretStoreRef.name
          value: my-store
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore

  - it: sets refresh interval
    set:
      externalSecrets:
        enabled: true
        refreshInterval: 30m
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 30m

  - it: renders secret data mappings
    set:
      externalSecrets:
        enabled: true
        data:
          - secretKey: DB_PASSWORD
            remoteKey: myapp/db
            property: password
    asserts:
      - equal:
          path: spec.data[0].secretKey
          value: DB_PASSWORD
      - equal:
          path: spec.data[0].remoteRef.key
          value: myapp/db
      - equal:
          path: spec.data[0].remoteRef.property
          value: password

  - it: maps Vikunja default secret keys
    set:
      externalSecrets.enabled: true
    asserts:
      - contains:
          path: spec.data
          content:
            secretKey: VIKUNJA_DATABASE_PASSWORD
            remoteRef:
              key: vikunja/postgres
              property: password
          any: true
      - contains:
          path: spec.data
          content:
            secretKey: VIKUNJA_SERVICE_JWTSECRET
            remoteRef:
              key: vikunja/service
              property: jwtSecret
          any: true

  - it: maps OIDC client secret when added to data
    set:
      externalSecrets:
        enabled: true
        data:
          - secretKey: VIKUNJA_DATABASE_PASSWORD
            remoteKey: vikunja/postgres
            property: password
          - secretKey: VIKUNJA_SERVICE_JWTSECRET
            remoteKey: vikunja/service
            property: jwtSecret
          - secretKey: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTSECRET
            remoteKey: vikunja/oidc
            property: clientSecret
    asserts:
      - contains:
          path: spec.data
          content:
            secretKey: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTSECRET
            remoteRef:
              key: vikunja/oidc
              property: clientSecret
          any: true
