suite: CNPG Cluster
templates:
  - templates/database/cnpg-cluster.yaml
capabilities:
  apiVersions:
    - postgresql.cnpg.io/v1
    - barmancloud.cnpg.io/v1
    - garage.rajsingh.info/v1beta1
tests:
  - it: is not created when postgres is disabled
    set:
      postgres.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders cluster when postgres is enabled
    set:
      postgres.enabled: true
    asserts:
      - isKind:
          of: Cluster
        documentIndex: 0
      - equal:
          path: apiVersion
          value: postgresql.cnpg.io/v1
        documentIndex: 0

  - it: uses configured instances and storage
    set:
      postgres:
        enabled: true
        instances: 3
        storage:
          size: 20Gi
          storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.instances
          value: 3
        documentIndex: 0
      - equal:
          path: spec.storage.size
          value: 20Gi
        documentIndex: 0
      - equal:
          path: spec.storage.storageClass
          value: fast-ssd
        documentIndex: 0

  - it: sets database bootstrap config
    set:
      postgres:
        enabled: true
        database: mydb
        owner: myuser
    asserts:
      - equal:
          path: spec.bootstrap.initdb.database
          value: mydb
        documentIndex: 0
      - equal:
          path: spec.bootstrap.initdb.owner
          value: myuser
        documentIndex: 0

  - it: omits backup section when disabled
    set:
      postgres:
        enabled: true
        backup:
          enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isNull:
          path: spec.backup
        documentIndex: 0
      - isNull:
          path: spec.plugins
        documentIndex: 0

  - it: configures backup retention policy when enabled
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          retentionPolicy: "30d"
          endpoint: "http://garage.garage.svc.cluster.local:3900"
          credentialsSecret:
            name: my-creds
    asserts:
      - equal:
          path: spec.backup.retentionPolicy
          value: "30d"
        documentIndex: 0

---
suite: CNPG Backup
templates:
  - templates/database/cnpg-backup.yaml
capabilities:
  apiVersions:
    - barmancloud.cnpg.io/v1
    - garage.rajsingh.info/v1beta1
tests:
  - it: is not created when postgres is disabled
    set:
      postgres.enabled: false
      postgres.backup.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: is not created when backup is disabled
    set:
      postgres.enabled: true
      postgres.backup.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ObjectStore when backup is enabled
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          retentionPolicy: "30d"
          endpoint: "http://garage.garage.svc.cluster.local:3900"
          credentialsSecret:
            name: my-creds
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ObjectStore
        documentIndex: 0
      - equal:
          path: apiVersion
          value: barmancloud.cnpg.io/v1
        documentIndex: 0
      - equal:
          path: metadata.name
          value: vikunja-pg-barman
        documentIndex: 0
      - equal:
          path: spec.configuration.endpointURL
          value: "http://garage.garage.svc.cluster.local:3900"
        documentIndex: 0
      - equal:
          path: spec.configuration.destinationPath
          value: "s3://vikunja-pg-backups/"
        documentIndex: 0

  - it: references credentials secret in ObjectStore
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          endpoint: "http://garage.garage.svc.cluster.local:3900"
          credentialsSecret:
            name: my-creds
            accessKeyKey: ACCESS_KEY_ID
            secretKeyKey: ACCESS_SECRET_KEY
            regionKey: S3_REGION
    asserts:
      - equal:
          path: spec.configuration.s3Credentials.accessKeyId.name
          value: my-creds
        documentIndex: 0
      - equal:
          path: spec.configuration.s3Credentials.accessKeyId.key
          value: ACCESS_KEY_ID
        documentIndex: 0
      - equal:
          path: spec.configuration.s3Credentials.secretAccessKey.name
          value: my-creds
        documentIndex: 0
      - equal:
          path: spec.configuration.s3Credentials.secretAccessKey.key
          value: ACCESS_SECRET_KEY
        documentIndex: 0
      - equal:
          path: spec.configuration.s3Credentials.region.name
          value: my-creds
        documentIndex: 0
      - equal:
          path: spec.configuration.s3Credentials.region.key
          value: S3_REGION
        documentIndex: 0

  - it: enables wal and data compression
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          endpoint: "http://garage.garage.svc.cluster.local:3900"
          credentialsSecret:
            name: my-creds
    asserts:
      - equal:
          path: spec.configuration.wal.compression
          value: gzip
        documentIndex: 0
      - equal:
          path: spec.configuration.data.compression
          value: gzip
        documentIndex: 0

---
suite: CNPG ScheduledBackup
templates:
  - templates/database/cnpg-scheduled-backup.yaml
capabilities:
  apiVersions:
    - postgresql.cnpg.io/v1
tests:
  - it: is not created when postgres is disabled
    set:
      postgres.enabled: false
      postgres.backup.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: is not created when backup is disabled
    set:
      postgres.enabled: true
      postgres.backup.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ScheduledBackup when both postgres and backup are enabled
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          schedule: "0 3 * * *"
          retentionPolicy: "7d"
          endpoint: "http://garage.garage.svc.cluster.local:3900"
          credentialsSecret:
            name: my-creds
    asserts:
      - isKind:
          of: ScheduledBackup
      - equal:
          path: apiVersion
          value: postgresql.cnpg.io/v1
      - equal:
          path: spec.schedule
          value: "0 3 * * *"
      - equal:
          path: spec.backupOwnerReference
          value: self
      - equal:
          path: spec.cluster.name
          value: vikunja-pg
      - equal:
          path: spec.pluginConfiguration.name
          value: barman-cloud.cloudnative-pg.io
      - equal:
          path: spec.pluginConfiguration.parameters.barmanObjectName
          value: vikunja-pg-barman
