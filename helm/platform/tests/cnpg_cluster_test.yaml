suite: CNPG Cluster
templates:
  - templates/database/cnpg-cluster.yaml
capabilities:
  apiVersions:
    - postgresql.cnpg.io/v1
    - barmancloud.cnpg.io/v1
    - garage.rajsingh.info/v1beta1
tests:
  - it: is not created when postgres is disabled
    set:
      postgres.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders cluster when postgres is enabled
    set:
      postgres.enabled: true
    asserts:
      - isKind:
          of: Cluster
        documentIndex: 0
      - equal:
          path: apiVersion
          value: postgresql.cnpg.io/v1
        documentIndex: 0

  - it: uses configured instances and storage
    set:
      postgres:
        enabled: true
        instances: 3
        storage:
          size: 20Gi
          storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.instances
          value: 3
        documentIndex: 0
      - equal:
          path: spec.storage.size
          value: 20Gi
        documentIndex: 0
      - equal:
          path: spec.storage.storageClass
          value: fast-ssd
        documentIndex: 0

  - it: sets database bootstrap config
    set:
      postgres:
        enabled: true
        database: mydb
        owner: myuser
    asserts:
      - equal:
          path: spec.bootstrap.initdb.database
          value: mydb
        documentIndex: 0
      - equal:
          path: spec.bootstrap.initdb.owner
          value: myuser
        documentIndex: 0

  - it: omits backup section when disabled
    set:
      postgres:
        enabled: true
        backup:
          enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isNull:
          path: spec.backup
        documentIndex: 0
      - isNull:
          path: spec.plugins
        documentIndex: 0

  - it: renders four documents when backup is enabled
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          retentionPolicy: "30d"
          garage:
            clusterRef: garage
            endpoint: "http://garage.garage.svc.cluster.local:3900"
    asserts:
      - hasDocuments:
          count: 4

  - it: cluster references barman plugin when backup enabled
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          retentionPolicy: "30d"
          garage:
            clusterRef: garage
            endpoint: "http://garage.garage.svc.cluster.local:3900"
    asserts:
      - equal:
          path: spec.plugins[0].name
          value: barman-cloud.cloudnative-pg.io
        documentIndex: 0
      - equal:
          path: spec.backup.retentionPolicy
          value: "30d"
        documentIndex: 0

  - it: renders GarageBucket for pg backups
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          garage:
            clusterRef: my-garage
            endpoint: "http://garage.garage.svc.cluster.local:3900"
    asserts:
      - isKind:
          of: GarageBucket
        documentIndex: 1
      - equal:
          path: apiVersion
          value: garage.rajsingh.info/v1beta1
        documentIndex: 1
      - equal:
          path: metadata.name
          value: vikunja-pg-backups
        documentIndex: 1
      - equal:
          path: spec.clusterRef.name
          value: my-garage
        documentIndex: 1

  - it: renders GarageKey for pg backup credentials
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          garage:
            clusterRef: my-garage
            endpoint: "http://garage.garage.svc.cluster.local:3900"
    asserts:
      - isKind:
          of: GarageKey
        documentIndex: 2
      - equal:
          path: apiVersion
          value: garage.rajsingh.info/v1beta1
        documentIndex: 2
      - equal:
          path: metadata.name
          value: vikunja-pg-s3-key
        documentIndex: 2
      - equal:
          path: spec.clusterRef.name
          value: my-garage
        documentIndex: 2
      - equal:
          path: spec.secretTemplate.name
          value: vikunja-pg-s3-key
        documentIndex: 2
      - equal:
          path: spec.secretTemplate.additionalData.S3_REGION
          value: "garage"
        documentIndex: 2
      - equal:
          path: spec.bucketPermissions[0].bucketRef.name
          value: vikunja-pg-backups
        documentIndex: 2
      - equal:
          path: spec.bucketPermissions[0].read
          value: true
        documentIndex: 2
      - equal:
          path: spec.bucketPermissions[0].write
          value: true
        documentIndex: 2

  - it: objectstore references GarageKey secret for credentials
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          garage:
            clusterRef: garage
            endpoint: "http://garage.garage.svc.cluster.local:3900"
    asserts:
      - isKind:
          of: ObjectStore
        documentIndex: 3
      - equal:
          path: apiVersion
          value: barmancloud.cnpg.io/v1
        documentIndex: 3
      - equal:
          path: spec.configuration.endpointURL
          value: "http://garage.garage.svc.cluster.local:3900"
        documentIndex: 3
      - equal:
          path: spec.configuration.s3Credentials.region.name
          value: vikunja-pg-s3-key
        documentIndex: 3
      - equal:
          path: spec.configuration.s3Credentials.region.key
          value: S3_REGION
        documentIndex: 3
      - equal:
          path: spec.configuration.s3Credentials.accessKeyId.name
          value: vikunja-pg-s3-key
        documentIndex: 3
      - equal:
          path: spec.configuration.s3Credentials.accessKeyId.key
          value: access-key-id
        documentIndex: 3
      - equal:
          path: spec.configuration.s3Credentials.secretAccessKey.name
          value: vikunja-pg-s3-key
        documentIndex: 3
      - equal:
          path: spec.configuration.s3Credentials.secretAccessKey.key
          value: secret-access-key
        documentIndex: 3

  - it: objectstore enables wal and data compression
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          garage:
            clusterRef: garage
            endpoint: "http://garage.garage.svc.cluster.local:3900"
    asserts:
      - equal:
          path: spec.configuration.wal.compression
          value: gzip
        documentIndex: 3
      - equal:
          path: spec.configuration.data.compression
          value: gzip
        documentIndex: 3

---
suite: CNPG ScheduledBackup
templates:
  - templates/database/cnpg-scheduled-backup.yaml
capabilities:
  apiVersions:
    - postgresql.cnpg.io/v1
tests:
  - it: is not created when postgres is disabled
    set:
      postgres.enabled: false
      postgres.backup.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: is not created when backup is disabled
    set:
      postgres.enabled: true
      postgres.backup.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ScheduledBackup when both postgres and backup are enabled
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          schedule: "0 3 * * *"
          retentionPolicy: "7d"
          garage:
            clusterRef: garage
            endpoint: "http://garage.garage.svc.cluster.local:3900"
    asserts:
      - isKind:
          of: ScheduledBackup
      - equal:
          path: apiVersion
          value: postgresql.cnpg.io/v1
      - equal:
          path: spec.schedule
          value: "0 3 * * *"
      - equal:
          path: spec.backupOwnerReference
          value: self
      - equal:
          path: spec.pluginConfiguration.name
          value: barman-cloud.cloudnative-pg.io
