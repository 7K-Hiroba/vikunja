{{- if .Values.observability.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform.name" . }}-dashboard
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.observability.grafanaDashboard.folderLabel }}
    grafana_folder: {{ . | quote }}
    {{- end }}
  annotations:
    grafana_dashboard_uid: {{ include "platform.name" . }}
data:
  {{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |-
    {{- tpl ($.Files.Get $path) $ | nindent 4 }}
  {{- end }}
{{- end }}
