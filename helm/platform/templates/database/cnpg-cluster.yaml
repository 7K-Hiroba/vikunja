{{- if .Values.postgres.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "platform.name" . }}-pg
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgres.instances }}
  imageName: {{ .Values.postgres.imageName }}

  bootstrap:
    initdb:
      database: {{ .Values.postgres.database }}
      owner: {{ .Values.postgres.owner }}

  storage:
    size: {{ .Values.postgres.storage.size }}
    {{- if .Values.postgres.storage.storageClass }}
    storageClass: {{ .Values.postgres.storage.storageClass }}
    {{- end }}

  resources:
    {{- toYaml .Values.postgres.resources | nindent 4 }}

  {{- if .Values.postgres.backup.enabled }}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: false
      parameters:
        barmanObjectName: {{ include "platform.name" . }}-pg-barman

  backup:
    retentionPolicy: {{ .Values.postgres.backup.retentionPolicy }}
  {{- end }}
{{- end }}
{{- if .Values.postgres.backup.enabled }}
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: {{ include "platform.name" . }}-pg-backups
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  clusterRef:
    name: {{ .Values.postgres.backup.garage.clusterRef }}
    {{- if .Values.postgres.backup.garage.clusterRefNamespace }}
    namespace: {{ .Values.postgres.backup.garage.clusterRefNamespace }}
    {{- end }}
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: {{ include "platform.name" . }}-pg-s3-key
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  clusterRef:
    name: {{ .Values.postgres.backup.garage.clusterRef }}
    {{- if .Values.postgres.backup.garage.clusterRefNamespace }}
    namespace: {{ .Values.postgres.backup.garage.clusterRefNamespace }}
    {{- end }}
  name: "{{ include "platform.name" . }} PG Backup Key"
  secretTemplate:
    name: {{ include "platform.name" . }}-pg-s3-key
    additionalData:
      S3_REGION: {{ .Values.postgres.backup.garage.region | default "garage" | quote }}
  bucketPermissions:
    - bucketRef:
        name: {{ include "platform.name" . }}-pg-backups
      read: true
      write: true
{{- if and .Values.postgres.backup.garage.clusterRefNamespace (ne .Values.postgres.backup.garage.clusterRefNamespace .Release.Namespace) }}
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageReferenceGrant
metadata:
  name: {{ include "platform.name" . }}-pg-from-{{ .Release.Namespace }}
  namespace: {{ .Values.postgres.backup.garage.clusterRefNamespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  from:
    - kind: GarageKey
      namespace: {{ .Release.Namespace }}
    - kind: GarageBucket
      namespace: {{ .Release.Namespace }}
  to:
    - kind: GarageCluster
      name: {{ .Values.postgres.backup.garage.clusterRef }}
{{- end }}
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: {{ include "platform.name" . }}-pg-barman
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  configuration:
    destinationPath: "s3://{{ include "platform.name" . }}-pg-backups/"
    endpointURL: {{ .Values.postgres.backup.garage.endpoint | quote }}
    s3Credentials:
      region:
        name: {{ include "platform.name" . }}-pg-s3-key
        key: S3_REGION
      accessKeyId:
        name: {{ include "platform.name" . }}-pg-s3-key
        key: access-key-id
      secretAccessKey:
        name: {{ include "platform.name" . }}-pg-s3-key
        key: secret-access-key
    wal:
      compression: gzip
    data:
      compression: gzip
{{- end }}
