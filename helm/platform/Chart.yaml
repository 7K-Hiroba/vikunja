apiVersion: v2
name: vikunja-platform
description: |-
  Platform dependencies for the vikunja chart — provisions the cross-cutting
  resources Vikunja needs but that aren't part of its workload lifecycle:
  PostgreSQL (CNPG), ExternalSecrets, and observability (ServiceMonitor,
  Grafana dashboard, PrometheusRule).
