# Platform dependencies for Vikunja.
#
# Each block is gated behind `<resource>.enabled` (default false) so the chart
# is safe to install into clusters that don't have the relevant operators
# present. Enabling a feature without its required CRDs causes a hard fail at
# template-render time — see templates/checks.yaml.

global:
  # -- Application name. Used as a prefix for all resources created here and
  # as the selector label that ties this chart's ServiceMonitor / dashboards
  # back to the workload deployed by the base chart.
  appName: vikunja
  # -- Release name of the base chart deployment. When set, the
  # ServiceMonitor selector matches `app.kubernetes.io/instance: <baseInstance>`
  # so multiple releases of the same app coexist safely. Leave empty to match
  # by name only.
  baseInstance: ""

# -- PostgreSQL database. Vikunja prefers Postgres for any non-trivial
# install; the CNPG-managed cluster created here is reachable at
# `<release>-pg-rw` (read-write service) and `<release>-pg-ro` (read-only).
postgres:
  enabled: false
  # -- Provider: "cnpg" (CloudNativePG operator)
  provider: cnpg
  instances: 1
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
  # -- PostgreSQL image. Renovate keeps this current.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  # -- Database to create on bootstrap.
  database: vikunja
  # -- Database role that owns the database.
  owner: vikunja
  # -- Backup configuration. Requires an S3 bucket and credentials in a
  # Secret named `<release>-pg-backup-creds` (keys: ACCESS_KEY_ID,
  # ACCESS_SECRET_KEY).
  backup:
    enabled: false
    schedule: "0 2 * * *"
    retentionPolicy: "7d"
    garage:
      clusterRef: garage
      endpoint: "http://garage.garage.svc.cluster.local:3900"

# -- S3-compatible object storage. When enabled, the base chart switches
# Vikunja from local filesystem storage to S3 — uploaded files go to the
# bucket instead of a PVC. This also enables HA: multiple replicas can
# safely serve traffic since all file I/O goes through the shared object store.
#
# The Garage provider creates a GarageBucket and GarageKey. The key's
# Secret (<app>-s3-key, keys: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, S3_BUCKET)
# is referenced by the base chart's s3.existingSecret to inject
# VIKUNJA_FILES_S3_ACCESSKEY / VIKUNJA_FILES_S3_SECRETKEY into the pod.
s3:
  enabled: false
  # -- Provider: "crossplane" | "garage"
  provider: crossplane
  # -- Bucket name (will be prefixed with the app name).
  bucketName: files
  # -- Access control
  acl: private

  # -- Crossplane-specific settings (provider: crossplane)
  crossplane:
    region: us-east-1
    providerConfigRef: aws-provider
    lifecycle:
      enabled: false
      expirationDays: 90

  # -- Garage-specific settings (provider: garage)
  garage:
    clusterRef: garage
    # -- S3 endpoint URL. Pass this to the base chart's s3.endpoint value
    # so Vikunja can reach the Garage API.
    endpoint: "http://garage.garage.svc.cluster.local:3900"

# -- ExternalSecret. Mirrors a remote secret store entry into a Kubernetes
# Secret named after the app (`vikunja`). The base chart's `envFrom`
# references this Secret to pull credentials into the Vikunja pod.
externalSecrets:
  enabled: false
  refreshInterval: 1h
  storeRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  # -- Individual secret mappings. Vikunja consumes these as VIKUNJA_* env
  # vars on the workload pod (the Secret keys are the env var names).
  data:
    - secretKey: VIKUNJA_DATABASE_PASSWORD
      remoteKey: vikunja/postgres
      property: password
    - secretKey: VIKUNJA_SERVICE_JWTSECRET
      remoteKey: vikunja/service
      property: jwtSecret
    # -- OIDC client secret. Uncomment and adjust the provider ID to match
    # the VIKUNJA_AUTH_OPENID_PROVIDERS_<ID>_CLIENTSECRET env var in the
    # base chart. The remote key path should point to where your secret
    # store keeps the OIDC client secret for Vikunja.
    # - secretKey: VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTSECRET
    #   remoteKey: vikunja/oidc
    #   property: clientSecret
  # -- Pull every key under a remote path. Use this OR `data` — both works
  # but only when keys don't collide.
  dataFrom: []
  # -- Optional template for synthesizing values from retrieved data.
  # See https://external-secrets.io/latest/guides/templating/
  target:
    template: {}

# -- Observability. The ServiceMonitor selector targets the workload pods
# created by the helm/base release; set `global.baseInstance` to its release
# name for tighter scoping when multiple releases coexist.
observability:
  serviceMonitor:
    enabled: false
    # -- Additional labels for ServiceMonitor discovery (e.g. release:
    # kube-prometheus-stack to match a kube-prometheus-stack instance).
    additionalLabels: {}
    # -- Service port name to scrape — matches the `http` named port the
    # base chart exposes on the Vikunja Service.
    port: http
    # -- Vikunja exposes Prometheus metrics on /metrics when
    # VIKUNJA_SERVICE_ENABLEMETRICS=true (default in helm/base values.yaml).
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

  grafanaDashboard:
    enabled: false
    folderLabel: ""

  # -- PrometheusRule alerts. The defaults fire on Vikunja's standard
  # request-rate / latency metrics and on absent scrape targets. Override
  # `groups` to replace, or extend with extra entries.
  prometheusRules:
    enabled: false
    groups:
      - name: '{{ include "platform.name" . }}.rules'
        rules:
          - alert: VikunjaTargetDown
            expr: |
              up{namespace="{{ .Release.Namespace }}", service="{{ include "platform.name" . }}"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: '{{ include "platform.name" . }} target is down'
              description: "Prometheus has been unable to scrape {{ include `platform.name` . }} in namespace {{ .Release.Namespace }} for 5 minutes."
          - alert: VikunjaHighErrorRate
            expr: |
              sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}", service="{{ include "platform.name" . }}", status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}", service="{{ include "platform.name" . }}"}[5m]))
              > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: 'High error rate for {{ include "platform.name" . }}'
              description: "Vikunja is returning 5xx for more than 5% of requests over the last 5 minutes."
          - alert: VikunjaHighLatency
            expr: |
              histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}", service="{{ include "platform.name" . }}"}[5m])))
              > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: 'High p99 latency for {{ include "platform.name" . }}'
              description: "Vikunja API p99 latency is above 1s for the last 5 minutes."
